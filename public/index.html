<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJjpxFsIsk</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Chat" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="sunrise-overlay" class="hidden" aria-hidden="true">
    <div class="sunrise-rise">
      <div class="sunrise-sun"></div>
      <div class="sunrise-greeting">
        <span class="sunrise-greet-main">Good Morning</span>
        <span class="sunrise-greet-sub">Have a nice day :)</span>
      </div>
    </div>
  </div>

  <div id="login-view" class="card">
    <h1>Login</h1>
    <form id="login-form">
      <input id="username" type="text" placeholder="Username" autocomplete="username" required />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
      <button type="submit">Login</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>

  <button id="panic-btn" class="hidden" type="button" title="Panic: clear session & leave" aria-label="Panic">🚨</button>

  <div id="chat-view" class="hidden">
    <header>
      <div class="header-left">
        <div class="header-title">
          <span id="partner-avatar" class="hidden" aria-hidden="true"></span>
          <span id="me" title="Ganti avatar" tabindex="0" role="button" aria-label="Ganti avatar"></span>
        </div>
        <div id="presence-status" class="hidden">
          <span id="presence-text"></span>
        </div>
      </div>
      <div class="right">
        <div id="peer-switcher" class="hidden">
          <button id="peer-switcher-btn" type="button" aria-haspopup="true" aria-expanded="false">
            <span id="peer-switcher-label">mutatio</span>
            <span id="peer-switcher-badge" class="peer-badge hidden">0</span>
            <span class="peer-switcher-caret">▾</span>
          </button>
          <div id="peer-switcher-menu" class="hidden" role="menu"></div>
        </div>
        <button id="gallery-btn" class="hidden" title="Gallery">🖼️</button>
        <button id="call-btn" class="hidden" title="Video call">📹</button>
        <button id="notif-toggle" title="Notifications">🔕 Off</button>
        <button id="logout">Logout</button>
      </div>
    </header>
    <div class="messages-wrap">
      <main id="messages"></main>
      <div id="messages-loading" class="hidden">
        <div class="spinner"></div>
        <span>Loading chat...</span>
      </div>
    </div>
    <div id="call-incoming" class="hidden">
      <span class="call-incoming-text"><b id="call-incoming-from"></b> is calling...</span>
      <button id="call-accept" type="button" class="call-ok" title="Accept">Accept</button>
      <button id="call-decline" type="button" class="call-danger" title="Decline">Decline</button>
    </div>
    <div id="typing-indicator" class="hidden">
      <span class="typing-bubble">
        <span class="typing-name"></span>
        <span class="typing-dots"><span></span><span></span><span></span></span>
      </span>
    </div>
    <div id="reply-preview" class="hidden">
      <div class="reply-preview-bar"></div>
      <div class="reply-preview-content">
        <div class="reply-preview-user" id="reply-preview-user"></div>
        <div class="reply-preview-text" id="reply-preview-text"></div>
      </div>
      <button id="reply-cancel" type="button" title="Cancel reply">✕</button>
    </div>
    <form id="chat-form">
      <div class="attach-wrap">
        <button type="button" id="attach-menu-btn" class="attach-btn" title="Attach" aria-haspopup="true" aria-expanded="false">⋮</button>
        <div id="attach-menu" class="attach-menu hidden" role="menu">
          <label class="attach-menu-item" role="menuitem" title="File">
            <span class="attach-menu-icon">📎</span>
            <input id="file-input" type="file" accept="image/*,video/*" hidden />
          </label>
          <button type="button" id="camera-btn" class="attach-menu-item" role="menuitem" title="Foto">
            <span class="attach-menu-icon">📷</span>
          </button>
          <button type="button" id="mic-btn" class="attach-menu-item" role="menuitem" title="Voice Note">
            <span class="attach-menu-icon">🎤</span>
          </button>
        </div>
      </div>
      <input id="msg" type="text" placeholder="Type a message..." autocomplete="off" maxlength="1000" />
      <div class="emoji-wrap">
        <button type="button" id="emoji-btn" class="emoji-btn" title="Emoji" aria-haspopup="true" aria-expanded="false">😊</button>
        <div id="emoji-panel" class="emoji-panel hidden" role="menu"></div>
      </div>
      <div class="emoji-wrap">
        <button type="button" id="sticker-btn" class="emoji-btn" title="Sticker" aria-haspopup="true" aria-expanded="false">🎨</button>
        <div id="sticker-panel" class="sticker-panel hidden" role="menu"></div>
      </div>
      <button type="submit">Send</button>
    </form>
    <div id="recorder" class="hidden">
      <div class="rec-dot"></div>
      <span id="rec-timer">0:00</span>
      <span class="rec-label">Recording voice note...</span>
      <button id="rec-cancel" type="button" title="Cancel">✕</button>
      <button id="rec-send" type="button" title="Send">Send</button>
    </div>
    <div id="preview" class="hidden">
      <img id="preview-img" alt="preview" />
      <video id="preview-video" class="hidden" controls controlslist="nodownload noplaybackrate" playsinline oncontextmenu="return false"></video>
      <button id="preview-cancel" type="button" title="Cancel">✕</button>
    </div>
  </div>

  <div id="gallery-modal" class="hidden">
    <div class="gallery-header">
      <span>Gallery</span>
      <button id="gallery-close" type="button" title="Close">✕</button>
    </div>
    <div id="gallery-grid"></div>
    <div id="gallery-loading" class="hidden"><div class="spinner"></div><span>Loading gallery...</span></div>
    <div id="gallery-empty" class="hidden">No media yet</div>
    <div id="gallery-pagination" class="hidden">
      <button id="gallery-prev" type="button">‹ Sebelumnya</button>
      <span id="gallery-page-info"></span>
      <button id="gallery-next" type="button">Selanjutnya ›</button>
    </div>
  </div>

  <div id="image-viewer" class="hidden">
    <button id="viewer-close" type="button" title="Close">✕</button>
    <button id="viewer-prev" type="button" title="Previous" aria-label="Previous">‹</button>
    <button id="viewer-next" type="button" title="Next" aria-label="Next">›</button>
    <div id="viewer-content"></div>
    <div id="viewer-counter"></div>
  </div>

  <div id="call-modal" class="hidden">
    <div class="call-remote-wrap">
      <video id="call-remote-video" autoplay playsinline></video>
      <div id="call-remote-placeholder" class="call-placeholder">
        <div class="call-avatar">📞</div>
        <div class="call-status-text">
          <div id="call-peer-name"></div>
          <div id="call-state">Ringing…</div>
          <div id="call-timer" class="hidden">0:00</div>
        </div>
      </div>
    </div>
    <div class="call-local-wrap">
      <video id="call-local-video" autoplay playsinline muted></video>
    </div>
    <div class="call-controls">
      <button id="call-mute" type="button" title="Mute mic" data-on="true">🎤</button>
      <button id="call-speaker" type="button" title="Mute speaker" data-on="true">🔊</button>
      <button id="call-camera" type="button" title="Toggle camera" data-on="true">📹</button>
      <button id="call-switch" type="button" title="Switch camera" class="hidden">🔄</button>
      <button id="call-self-view" type="button" title="Hide self view" data-on="true">👤</button>
      <button id="call-share" type="button" title="Share screen (nonton bareng)" class="hidden" data-on="false">🖥️</button>
      <button id="call-minimize" type="button" title="Minimize (chat while calling)">🗕</button>
      <button id="call-pip" type="button" title="Picture-in-Picture" class="hidden">🖼️</button>
      <button id="call-end" type="button" class="call-danger" title="End call">📞</button>
    </div>
    <div id="call-drag-hint" class="hidden" aria-hidden="true">⋮⋮</div>
    <div id="call-resize-handle" class="hidden" aria-hidden="true"></div>
    <button id="call-expand" type="button" class="hidden" title="Back to fullscreen">⤢</button>
  </div>

  <div id="avatar-modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="avatar-modal-title">
    <div class="avatar-modal-box">
      <div class="avatar-modal-header">
        <span id="avatar-modal-title">Pilih avatar</span>
        <button id="avatar-modal-close" type="button" title="Tutup" aria-label="Tutup">✕</button>
      </div>
      <div class="avatar-modal-body">
        <div id="avatar-preview" class="user-avatar user-avatar-lg">
          <span class="user-avatar-initial"></span>
        </div>
        <div id="avatar-preset-grid" class="avatar-preset-grid" role="listbox" aria-label="Pilihan avatar"></div>
        <p id="avatar-error" class="avatar-error hidden"></p>
        <div class="avatar-modal-actions">
          <button id="avatar-remove" type="button" class="avatar-btn-secondary">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <div id="camera-modal" class="hidden">
    <div class="cam-box">
      <video id="cam-video" autoplay playsinline muted></video>
      <div id="cam-timer" class="cam-timer hidden">● 0:00</div>
      <div class="cam-controls">
        <button id="cam-switch" type="button" title="Switch camera">🔄</button>
        <button id="cam-snap" type="button" title="Take photo">⬤</button>
        <button id="cam-record" type="button" title="Record video">🎥</button>
        <button id="cam-close" type="button" title="Close">✕</button>
      </div>
      <div id="cam-error" class="cam-error"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/call.js"></script>
  <script src="/app.js"></script>
</body>
</html>
